# Configuration file for Synapse.

server_name: "54.197.248.7"

# AUTO-MANAGED: rewritten at every Node.js startup by syncPublicBaseUrl() in
# src/index.js — uses the live Cloudflare tunnel URL or the current local IP.
# Do NOT hardcode this manually; it will be overwritten on the next server start.
public_baseurl: "https://browsers-her-searches-decided.trycloudflare.com/"

# --- ENTERPRISE REGISTRATION SETTINGS ---
enable_registration: true
registration_requires_token: true
# ---------------------------------------

pid_file: /data/homeserver.pid

listeners:
  - port: 8008
    resources:
      - names:
          - client
          - federation
        compress: false
    tls: false
    type: http
    x_forwarded: true

# --- DATABASE CONFIG (POSTGRESQL – REQUIRED ON WINDOWS) ---
database:
  name: psycopg2
  args:
    user: synapse_user
    password: synapse_pass
    database: synapse_db
    host: synapse-db
    port: 5432
    cp_min: 5
    cp_max: 10
# ---------------------------------------------------------

log_config: "/data/localhost.log.config"

media_store_path: /data/media_store

registration_shared_secret: "Cj,OLV3OtXRTV1byfxa^9L&v-_Qm*=VC~pJecOL2meAr,6.=4f"

report_stats: false

# Relaxed rate limiting for bot logins
rc_login:
  address:
    per_second: 1
    burst_count: 20
  account:
    per_second: 1
    burst_count: 20
  failed_attempts:
    per_second: 1
    burst_count: 20

macaroon_secret_key: "W:KlxOy__G*QcF&P;vN.Wc-nc@v=iNr0LYt3W6NLDGA4U_NFKG"
form_secret: "3VZdeT2;K+CbxLzQjcR:5MeRS:fJl=;_dTVeJMU4E2h*~oFkD6"

signing_key_path: "/data/localhost.signing.key"

trusted_key_servers:
  - server_name: "matrix.org"

# --- MATRIX NATIVE VOIP ---
