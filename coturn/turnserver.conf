listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Set this to your server's PUBLIC IP address
# Find it with: curl -s https://checkip.amazonaws.com
external-ip=YOUR_PUBLIC_IP

realm=YOUR_PUBLIC_IP

# HMAC-SHA1 token auth — must match turn_shared_secret in homeserver.yaml
use-auth-secret
static-auth-secret=c098adffdc0a480846769e7d468563971dc7243c67ebea359e45c7a2fccd5497

# Relay port range — open 49152-65535/UDP in your firewall
min-port=49152
max-port=65535

total-quota=100
no-multicast-peers
no-cli

log-file=/var/log/coturn/turnserver.log
